<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .calculator-card { max-width: 500px; margin: 2rem auto; }
        #result { min-height: 2.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card calculator-card shadow">
            <div class="card-body">
                <h1 class="card-title text-center mb-4">Calculator</h1>
                <div class="row mb-3">
                    <div class="col">
                        <label for="a" class="form-label">a</label>
                        <input type="number" class="form-control" id="a" step="any" placeholder="Enter number">
                    </div>
                    <div class="col">
                        <label for="b" class="form-label">b</label>
                        <input type="number" class="form-control" id="b" step="any" placeholder="Enter number">
                    </div>
                </div>
                <div class="d-flex flex-wrap justify-content-center gap-2 mb-3">
                    <button onclick="calc('add')" class="btn btn-primary">Add</button>
                    <button onclick="calc('subtract')" class="btn btn-secondary">Subtract</button>
                    <button onclick="calc('multiply')" class="btn btn-success">Multiply</button>
                    <button onclick="calc('divide')" class="btn btn-warning">Divide</button>
                    <button onclick="calc('power')" class="btn btn-info">Power</button>
                </div>
                <div id="result" class="alert alert-info text-center fw-bold" role="alert">
                    Ready
                </div>
            </div>
        </div>
    </div>
    <script>
        async function calc(operation) {
            const a = document.getElementById('a').value;
            const b = document.getElementById('b').value;
            if (a === '' || b === '') {
                document.getElementById('result').innerText = 'Please enter both numbers.';
                return;
            }
            try {
                // Use relative path to API
                const res = await fetch(`/${operation}?a=${a}&b=${b}`);
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Unknown error');
                }
                const data = await res.json();
                document.getElementById('result').innerText = `Result: ${data.result}`;
            } catch (err) {
                document.getElementById('result').innerText = `Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
